name: WeChat MiniProgram CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  preview:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup private key
        run: |
          mkdir -p private
          echo "${{ secrets.WX_PRIVATE_KEY }}" > private/private.${{ secrets.WX_APPID }}.key

      - name: Generate QR code
        run: |
          npm run preview -- \
            --appid ${{ secrets.WX_APPID }} \
            --privateKeyPath private/private.${{ secrets.WX_APPID }}.key

      - name: Upload QR code
        uses: actions/upload-artifact@v4
        with:
          name: preview-qr
          path: preview-qr.png

  upload:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup private key
        run: |
          mkdir -p private
          echo "${{ secrets.WX_PRIVATE_KEY }}" > private/private.${{ secrets.WX_APPID }}.key

      - name: Upload to WeChat
        run: |
          npm run upload -- \
            --appid ${{ secrets.WX_APPID }} \
            --privateKeyPath private/private.${{ secrets.WX_APPID }}.key \
            --version ${{ github.sha }} \
            --desc "Auto upload from GitHub Actions"
